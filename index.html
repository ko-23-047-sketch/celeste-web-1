<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JS DOOM: Texture Pack</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; image-rendering: pixelated; }
        #ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: #f00; text-shadow: 2px 2px #000; font-size: 24px; text-align: center;
            pointer-events: none; width: 100%; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui">HP: <span id="hp">100</span>% | LVL: <span id="lvl">1</span></div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const sprites = new Image();
// ВАЖНО: Укажи путь к сохраненной картинке
sprites.src = 'sprites.png'; 

const TILE_SIZE = 64;
// (Тут должны быть те же 10 уровней из предыдущего кода, я сокращу для краткости)
const levels = [[[1,1,1,1,1],[1,0,0,0,1],[1,0,1,3,1],[1,1,1,1,1]] /* и так далее */];

let currentLevel = 0;
let map = levels[0];
let player = { x: 90, y: 90, dir: 0, hp: 100, alive: true };
let enemies = [];

// Функция отрисовки текстурированной вертикальной полоски стены
function drawWallStrip(x, wallH, dist, textureX, hitType) {
    const screenY = (canvas.height - wallH) / 2;
    
    // Выбираем сегмент из спрайт-листа (128x128 пикселей на текстуру)
    let sx = (textureX % 1) * 128; // Позиция по X внутри текстуры
    let sy = (hitType === 3) ? 0 : 0; // Для простоты пока берем верхний ряд
    let offset = (hitType === 3) ? 128 : 0; // Сдвиг на вторую текстуру (синяя дверь)

    ctx.drawImage(sprites, sx + offset, sy, 1, 128, x, screenY, 1, wallH);
    
    // Затемнение (накладываем черный полупрозрачный слой в зависимости от дистанции)
    ctx.fillStyle = `rgba(0,0,0,${Math.min(0.8, dist/1000)})`;
    ctx.fillRect(x, screenY, 1, wallH);
}

function render() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Отрисовка пола и неба
    ctx.fillStyle = '#050000'; ctx.fillRect(0, 0, canvas.width, canvas.height/2);
    ctx.fillStyle = '#111'; ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);

    const numRays = canvas.width;
    const fov = Math.PI / 3;
    const zBuffer = [];

    for (let i = 0; i < numRays; i++) {
        let angle = (player.dir - fov/2) + (i / numRays) * fov;
        let dist = 0, hit = 0;
        let cx = Math.cos(angle), sy = Math.sin(angle);
        
        // Raycasting
        while (hit === 0 && dist < 1200) {
            dist += 2;
            let tx = Math.floor((player.x + cx * dist)/TILE_SIZE);
            let ty = Math.floor((player.y + sy * dist)/TILE_SIZE);
            if (map[ty] && map[ty][tx]) hit = map[ty][tx];
        }

        // Вычисляем, какой частью текстуры ударился луч
        let hitX = (player.x + cx * dist) % TILE_SIZE;
        let hitY = (player.y + sy * dist) % TILE_SIZE;
        let textureX = (hitX + hitY) / TILE_SIZE; // Упрощенная развертка

        dist *= Math.cos(angle - player.dir);
        zBuffer[i] = dist;
        let wallH = (TILE_SIZE * canvas.height) / dist;

        drawWallStrip(i, wallH, dist, textureX, hit);
    }

    // Рендер монстров спрайтами
    enemies.forEach(en => {
        let dx = en.x - player.x, dy = en.y - player.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        let angleToEn = Math.atan2(dy, dx) - player.dir;
        
        if (Math.abs(angleToEn) < fov) {
            let sx = (angleToEn / fov + 0.5) * canvas.width;
            let h = ( (en.isBoss ? 250 : 130) * canvas.height) / dist;
            
            // Рисуем монстра из нижней части спрайт-листа
            let spriteOffset = en.isBoss ? 128 : 0;
            ctx.drawImage(sprites, spriteOffset, 128, 128, 128, sx - h/2, (canvas.height - h)/2, h, h);
        }
    });
}

// Запуск после загрузки картинки
sprites.onload = () => {
    initLevel(0);
    setInterval(update, 1000/60);
};

function update() {
    // ... логика движения как раньше ...
    render();
}
</script>
</body>
</html>
