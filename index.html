<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS Doom Mobile</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; width: 100vw; height: 100vh; }
        
        /* Таблица рекордов (уменьшена для мобильных) */
        #leaderboard {
            position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7);
            padding: 5px; border: 1px solid #f00; font-size: 10px; z-index: 50; color: white;
        }

        #ui { position: absolute; top: 10px; left: 10px; color: #f00; font-size: 18px; z-index: 10; pointer-events: none; }
        
        /* КНОПКИ УПРАВЛЕНИЯ */
        .touch-ctrl {
            position: absolute; bottom: 20px; z-index: 100;
            user-select: none; -webkit-user-select: none;
        }

        /* Джойстик слева */
        #joystick-container { left: 30px; width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        .btn-move { 
            position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.2); 
            display: flex; align-items: center; justify-content: center; color: white; border-radius: 10px;
        }
        #btn-w { top: 0; left: 50px; }
        #btn-s { bottom: 0; left: 50px; }
        #btn-a { top: 50px; left: 0; }
        #btn-d { top: 50px; right: 0; }

        /* Кнопка стрельбы справа */
        #btn-fire { 
            right: 40px; bottom: 40px; width: 100px; height: 100px; 
            background: rgba(255,0,0,0.4); border: 3px solid red; 
            border-radius: 50%; color: white; font-weight: bold; font-size: 20px;
        }

        #auth-overlay, .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1>DOOM MOBILE</h1>
        <button id="login-btn" style="padding: 20px;">ВОЙТИ ЧЕРЕЗ GOOGLE</button>
    </div>

    <div id="ui">HP: <span id="hp">100</span>% | LVL: <span id="lvl">1</span></div>
    
    <div id="joystick-container" class="touch-ctrl">
        <div class="btn-move" id="btn-w">↑</div>
        <div class="btn-move" id="btn-a">←</div>
        <div class="btn-move" id="btn-s">↓</div>
        <div class="btn-move" id="btn-d">→</div>
    </div>
    <button id="btn-fire" class="touch-ctrl">FIRE</button>

    <canvas id="game"></canvas>

<script>
// --- FIREBASE (оставь свой конфиг без изменений) ---
const firebaseConfig = {
    apiKey: "AIzaSyApp_aGExfiyGN8-gaz9LrpcElo0eH2qog",
    authDomain: "doooooooooom-c6131.firebaseapp.com",
    projectId: "doooooooooom-c6131",
    storageBucket: "doooooooooom-c6131.firebasestorage.app",
    messagingSenderId: "444272360243",
    appId: "1:444272360243:web:07890e04d15631e9e1dc46"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- УПРАВЛЕНИЕ ---
let keys = {};
function setupTouch(id, key) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
    el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
}

setupTouch('btn-w', 'KeyW');
setupTouch('btn-s', 'KeyS');
setupTouch('btn-a', 'KeyA');
setupTouch('btn-d', 'KeyD');

// Кнопка стрельбы и поворот камеры тапом
const fireBtn = document.getElementById('btn-fire');
fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

// Поворот камеры на телефоне (свайп по правой части экрана)
let lastTouchX = null;
window.addEventListener('touchmove', (e) => {
    let touch = e.touches[0];
    if (touch.clientX > window.innerWidth / 2) { // Если свайп в правой половине экрана
        if (lastTouchX !== null) {
            let dx = touch.clientX - lastTouchX;
            player.dir += dx * 0.01; // Чувствительность поворота
        }
        lastTouchX = touch.clientX;
    }
});
window.addEventListener('touchend', () => { lastTouchX = null; });

// --- ДВИЖОК (копия твоего исправленного кода) ---
// ... (вставь сюда всю логику рендеринга и уровней из предыдущего ответа) ...
// Важно: в функции update() убери проверку PointerLock, так как на телефоне его нет.

function shoot() {
    if(!player.alive) return;
    player.isFiring = true; player.fireFrame = 5;
    enemies.forEach((en, i) => {
        if(en.isVisible && Math.abs(en.screenX - canvas.width/2) < 50) {
            en.hp--;
            if(en.hp <= 0) enemies.splice(i, 1);
        }
    });
}

// ... остальной код рендеринга ...
</script>
</body>
</html>
