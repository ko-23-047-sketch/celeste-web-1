<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JS Doom: Firebase Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
        canvas { display: block; image-rendering: pixelated; }
        
        /* Интерфейс логина */
        #auth-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }

        /* Таблица рекордов */
        #leaderboard {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            padding: 10px; border: 1px solid #f00; font-size: 14px; max-width: 200px;
        }

        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 24px; pointer-events: none; text-align: center;}
        #timer-ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 28px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        #death-screen { background: rgba(139, 0, 0, 0.8); }
        #win-screen { background: rgba(0, 100, 0, 0.9); }
        button { padding: 10px 20px; cursor: pointer; background: #333; color: #fff; border: 2px solid #fff; margin: 10px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1>JS DOOM: ONLINE</h1>
        <button id="login-btn">ВОЙТИ ЧЕРЕЗ GOOGLE</button>
        <p>Нужен вход для сохранения рекордов</p>
    </div>

    <div id="leaderboard">
        <b style="color: #ffd700;">РЕКОРДЫ (TOP 5):</b>
        <div id="scores-list">Загрузка...</div>
    </div>

    <div id="timer-ui">TIME: <span id="timer">00:00.00</span></div>
    <div id="ui">HP: <span id="hp">100</span>% | LVL: <span id="lvl">1</span> <span id="boss-ui" style="display:none;">| BOSS: <span id="bhp">10</span></span></div>
    
    <div id="death-screen" class="overlay"><h1>ТЫ ПОГИБ</h1><button onclick="resetGame()">РЕСТАРТ</button></div>
    <div id="win-screen" class="overlay">
        <h1 style="color: #ffd700;">ПОБЕДА!</h1>
        <p>ТВОЕ ВРЕМЯ: <span id="final-time"></span></p>
        <button onclick="resetGame()">ИГРАТЬ СНОВА</button>
    </div>

    <canvas id="game"></canvas>

<script>
// --- КОНФИГУРАЦИЯ FIREBASE ---
// ВСТАВЬ СВОИ ДАННЫЕ ИЗ КОНСОЛИ FIREBASE ТУТ:
const firebaseConfig = {
    apiKey: "AIzaSyApp_aGExfiyGN8-gaz9LrpcElo0eH2qog",
  authDomain: "doooooooooom-c6131.firebaseapp.com",
  projectId: "doooooooooom-c6131",
  storageBucket: "doooooooooom-c6131.firebasestorage.app",
  messagingSenderId: "444272360243",
  appId: "1:444272360243:web:07890e04d15631e9e1dc46",
  measurementId: "G-W7FM27DQB6"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;

// Логика входа
document.getElementById('login-btn').onclick = () => {
    auth.signInWithPopup(provider).then(result => {
        currentUser = result.user;
        document.getElementById('auth-overlay').style.display = 'none';
        initLevel(0);
        loadLeaderboard();
    }).catch(error => console.error(error));
};

// Функция сохранения рекорда
async function saveScore(timeMs, timeStr) {
    if (!currentUser) return;
    try {
        await db.collection("leaderboard").add({
            name: currentUser.displayName,
            timeMs: timeMs,
            timeStr: timeStr,
            date: Date.now()
        });
        loadLeaderboard();
    } catch (e) { console.error("Ошибка сохранения: ", e); }
}

// Загрузка таблицы
async function loadLeaderboard() {
    const list = document.getElementById('scores-list');
    const snapshot = await db.collection("leaderboard")
        .orderBy("timeMs", "asc")
        .limit(5)
        .get();
    
    list.innerHTML = snapshot.docs.map((doc, i) => 
        `<div>${i+1}. ${doc.data().name} - ${doc.data().timeStr}</div>`
    ).join('');
}

// --- ОСНОВНОЙ КОД ИГРЫ (УПРОЩЕННО ДЛЯ ПРИМЕРА) ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hpEl = document.getElementById('hp'), lvlEl = document.getElementById('lvl'), bhpEl = document.getElementById('bhp');
const timerEl = document.getElementById('timer'), finalTimeEl = document.getElementById('final-time');
const deathScreen = document.getElementById('death-screen'), winScreen = document.getElementById('win-screen');

const wallTexture = new Image();
wallTexture.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAABmJLR0QA/wD/AP+gvaeTAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAB3RJTUUH6AMXDA0SNT86OAAAAYVJREFUeNrtm0FuwyAQRee66K6H6K6H6K4r96pS98geooByf90YAsSOf8YfAt9vMBjsi6L4vK7r908AAMYFAAAfAAB8AABOInp6mR068W9E9ExEv68A6Hmeu67rv9/v9y06eZ6v+YyZfVfA6/V6v91uP6IowvV6fXNEn0v6XNLnkj6X9LmkzyV9Lum/DQC9Xq/P6/X6mYm6S9olXfK6O78C0Ol0+pmiKKZpml/O6XQ6/U7T9DZN0zxN0/uS9LmkzyV9Lun76wDY7/f7uq7fUkoTET0zUXf9H89XALrdbr/jOM455zXnvE7T9O6IPpf0uaTPJX0u6XNJn0v6XNLnkj6X9N8GgGEYfhzH8S+l9I2Inu76P56vAAghfL9er59SSl8pZXp3RJ9L+lzS55I+l/S5pM8lfS7pc0mfS/rXv7CmaZ67rus/X8NTSmOaprcl6XNJn0v6XNLnkj6X9LmkzyV9Lun7688AXdf1n6Zp7o7Yv3B8AAB8AADwAQDABwAAfAAAfgIA/OQPAAD//wMAV9XisW0fT9sAAAAASUVORK5CYII=";

let currentLevel = 0, map = [], player = { x: 96, y: 96, dir: 0, z: 0, vY: 0, hp: 100, alive: false };
let startTime = 0, gameRunning = false;

// (Здесь должны быть твои уровни, функция spawnEnemies и render из предыдущего кода)
// Для экономии места я пропущу массив уровней, используй свой прошлый вариант.

function initLevel(n) {
    if (n >= 10) { // Конец игры
        gameRunning = false;
        const totalMs = Date.now() - startTime;
        const totalStr = timerEl.innerText;
        finalTimeEl.innerText = totalStr;
        winScreen.style.display = 'flex';
        player.alive = false;
        saveScore(totalMs, totalStr); // СОХРАНЯЕМ В ОБЛАКО
        return;
    }
    if (n === 0) { startTime = Date.now(); gameRunning = true; }
    // ... остальная логика initLevel из твоего кода ...
    player.alive = true;
    currentLevel = n;
    lvlEl.innerText = n + 1;
}

// Заглушка для цикла (вставь сюда свой полный update и render)
function gameLoop() {
    if(player.alive) {
        // Твой расчет лучей, управления и отрисовка
        if (gameRunning) {
            let diff = Date.now() - startTime;
            let m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000), ms = Math.floor((diff%1000)/10);
            timerEl.innerText = `${m}:${s<10?'0':''}${s}.${ms<10?'0':''}${ms}`;
        }
    }
    requestAnimationFrame(gameLoop);
}
gameLoop();

</script>
</body>
</html>
